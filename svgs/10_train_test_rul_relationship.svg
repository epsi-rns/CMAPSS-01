<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Train, test, and RUL file relationship</title>
<desc>Timeline showing one conceptual engine life. Train file: full trajectory to failure. Test file: same engine truncated before failure. RUL file: one integer — true remaining cycles at the truncation point.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- Timeline axis -->
<line x1="60" y1="290" x2="620" y2="290" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="316" text-anchor="middle">Engine cycles (time)</text>

<!-- Tick markers -->
<line x1="60"  y1="286" x2="60"  y2="294" stroke="#888780" stroke-width="0.8"/>
<text class="ts" x="60"  y="306" text-anchor="middle">0</text>
<line x1="490" y1="286" x2="490" y2="294" stroke="#888780" stroke-width="0.8"/>
<text class="ts" x="490" y="306" text-anchor="middle">t*</text>
<line x1="590" y1="286" x2="590" y2="294" stroke="#888780" stroke-width="0.8"/>
<text class="ts" x="590" y="306" text-anchor="middle">t_max</text>

<!-- t* label -->
<text class="ts" x="490" y="270" text-anchor="middle">last observed</text>
<text class="ts" x="490" y="283" text-anchor="middle">cycle</text>

<!-- TRAIN FILE -->
<text class="th" x="54" y="74" text-anchor="end" fill="#2c2c2a">train</text>
<text class="ts" x="54" y="90" text-anchor="end">file</text>
<rect x="60" y="60" width="530" height="28" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
<text class="ts" x="325" y="78" text-anchor="middle" fill="#085041">full trajectory — unit 1, cycles 1 to t_max</text>
<rect x="588" y="58" width="4" height="32" rx="1" fill="#993c1d"/>
<text class="ts" x="600" y="72" text-anchor="start" fill="#712b13">failure</text>
<text class="ts" x="600" y="85" text-anchor="start" fill="#712b13">RUL = 0</text>
<line x1="590" y1="95" x2="490" y2="118" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="545" y="107" text-anchor="middle">RUL computed:</text>
<text class="ts" x="545" y="120" text-anchor="middle">t_max - t_current</text>

<!-- TEST FILE -->
<text class="th" x="54" y="164" text-anchor="end" fill="#2c2c2a">test</text>
<text class="ts" x="54" y="180" text-anchor="end">file</text>
<rect x="60" y="150" width="430" height="28" rx="4" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
<text class="ts" x="275" y="168" text-anchor="middle" fill="#26215c">truncated — unit 1, cycles 1 to t*</text>
<line x1="490" y1="148" x2="490" y2="182" stroke="#534ab7" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="504" y="160" text-anchor="start" fill="#534ab7">cut here</text>
<text class="ts" x="504" y="173" text-anchor="start" fill="#534ab7">RUL = ?</text>
<rect x="490" y="150" width="100" height="28" rx="4" fill="none" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="ts" x="540" y="168" text-anchor="middle" fill="#888780">unknown</text>

<!-- RUL FILE -->
<text class="th" x="54" y="238" text-anchor="end" fill="#2c2c2a">RUL</text>
<text class="ts" x="54" y="254" text-anchor="end">file</text>
<rect x="430" y="224" width="120" height="40" rx="6" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
<text class="th" x="490" y="241" text-anchor="middle" fill="#412402">42</text>
<text class="ts" x="490" y="257" text-anchor="middle" fill="#854f0b">one integer per engine</text>
<line x1="490" y1="264" x2="490" y2="278" stroke="#854f0b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- Footer note -->
<text class="ts" x="60" y="340" text-anchor="start">RUL_FDxxx.txt contains one value per test engine: the true cycles remaining after the last row of that engine in the test file.</text>
</svg>
