<svg width="680" height="370" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" role="img">
<title>RUL target shape: raw vs piece-wise linear cap</title>
<desc>Two curves. Raw RUL is a straight diagonal from 200 down to 0. Capped RUL is flat at 125 for early cycles then diagonal to 0. The cap removes the uninformative long-range prediction problem.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <clipPath id="plot">
    <rect x="80" y="30" width="520" height="260"/>
  </clipPath>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- Axes -->
<line x1="80" y1="290" x2="614" y2="290" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="80" y1="290" x2="80"  y2="22"  stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="347" y="328" text-anchor="middle">Engine cycles (t)</text>
<text class="ts" x="28" y="160" text-anchor="middle" transform="rotate(-90,28,160)">RUL (cycles)</text>

<!-- Y ticks -->
<line x1="75" y1="290" x2="80" y2="290" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="70" y="294" text-anchor="end">0</text>
<line x1="75" y1="133" x2="80" y2="133" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="70" y="137" text-anchor="end">125</text>
<line x1="75" y1="38"  x2="80" y2="38"  stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="70" y="42"  text-anchor="end">200</text>

<!-- X ticks -->
<line x1="80"  y1="290" x2="80"  y2="296" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="80"  y="307" text-anchor="middle">0</text>
<line x1="257" y1="290" x2="257" y2="296" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="257" y="307" text-anchor="middle">75</text>
<line x1="600" y1="290" x2="600" y2="296" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="600" y="307" text-anchor="middle">200</text>

<!-- Gridlines -->
<line x1="80" y1="133" x2="600" y2="133" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="257" y1="30" x2="257" y2="290" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Raw RUL — blue dashed diagonal -->
<line clip-path="url(#plot)" x1="80" y1="38" x2="600" y2="290" stroke="#185FA5" stroke-width="2" stroke-dasharray="8 4"/>

<!-- Capped RUL — teal piece-wise -->
<polyline clip-path="url(#plot)" fill="none" stroke="#0F6E56" stroke-width="2.2"
  points="80,133 257,133 600,290"/>

<!-- Cap plateau annotation -->
<rect x="82" y="112" width="170" height="18" rx="3" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="167" y="124" text-anchor="middle" fill="#085041">RUL clamped at 125</text>

<!-- Diagonal label -->
<text class="ts" x="445" y="218" text-anchor="middle" fill="#085041">linearly</text>
<text class="ts" x="445" y="231" text-anchor="middle" fill="#085041">decreasing</text>

<!-- Raw annotation -->
<text class="ts" x="202" y="78" text-anchor="start" fill="#185FA5">raw RUL</text>
<text class="ts" x="202" y="91" text-anchor="start" fill="#185FA5">(straight diagonal)</text>

<!-- Uninformative zone -->
<rect x="82" y="38" width="170" height="90" rx="3" fill="none" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="167" y="64" text-anchor="middle" fill="#888780">predicting very high</text>
<text class="ts" x="167" y="77" text-anchor="middle" fill="#888780">RUL early in life</text>
<text class="ts" x="167" y="90" text-anchor="middle" fill="#888780">is uninformative</text>
<text class="ts" x="167" y="103" text-anchor="middle" fill="#888780">and harms training</text>

<!-- Legend -->
<rect x="430" y="38" width="168" height="52" rx="4" fill="white" stroke="#d3d1c7" stroke-width="0.5"/>
<line x1="440" y1="55" x2="468" y2="55" stroke="#185FA5" stroke-width="2" stroke-dasharray="8 4"/>
<text class="ts" x="476" y="59">Raw RUL</text>
<line x1="440" y1="75" x2="468" y2="75" stroke="#0F6E56" stroke-width="2.2"/>
<text class="ts" x="476" y="79">Capped RUL (cap=125)</text>
</svg>
