<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>C-MAPSS dataset matrix</title>
<desc>Four C-MAPSS sub-datasets as a difficulty matrix. Rows FD001-FD004, columns: conditions, fault modes, train trajectories, test trajectories, RUL file. Color encodes difficulty: teal=easiest, amber=medium, coral=hardest.</desc>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 15px; font-weight: bold; }
  .ts  { font-size: 12px; }
  .hd  { font-size: 13px; font-weight: bold; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Header row -->
<rect x="40"  y="40" width="110" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="95"  y="70" text-anchor="middle" fill="#2c2c2a">Dataset</text>

<rect x="158" y="40" width="110" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="213" y="62" text-anchor="middle" fill="#2c2c2a">Conditions</text>
<text class="ts" x="213" y="80" text-anchor="middle" fill="#5f5e5a">op settings</text>

<rect x="276" y="40" width="130" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="341" y="62" text-anchor="middle" fill="#2c2c2a">Fault modes</text>
<text class="ts" x="341" y="80" text-anchor="middle" fill="#5f5e5a">degraded modules</text>

<rect x="414" y="40" width="90" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="459" y="62" text-anchor="middle" fill="#2c2c2a">Train</text>
<text class="ts" x="459" y="80" text-anchor="middle" fill="#5f5e5a">trajectories</text>

<rect x="512" y="40" width="90" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="557" y="62" text-anchor="middle" fill="#2c2c2a">Test</text>
<text class="ts" x="557" y="80" text-anchor="middle" fill="#5f5e5a">trajectories</text>

<rect x="610" y="40" width="120" height="50" rx="4" fill="#d3d1c7" stroke="#5f5e5a" stroke-width="0.8"/>
<text class="hd" x="670" y="62" text-anchor="middle" fill="#2c2c2a">RUL file</text>
<text class="ts" x="670" y="80" text-anchor="middle" fill="#5f5e5a">ground truth</text>

<!-- FD001 row — teal (easiest) -->
<rect x="40"  y="104" width="110" height="62" rx="4" fill="#9FE1CB" stroke="#0f6e56" stroke-width="0.8"/>
<text class="th" x="95"  y="128" text-anchor="middle" fill="#04342C">FD001</text>
<text class="ts" x="95"  y="148" text-anchor="middle" fill="#085041">easiest</text>

<rect x="158" y="104" width="110" height="62" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="213" y="128" text-anchor="middle" fill="#085041">1</text>
<text class="ts" x="213" y="148" text-anchor="middle" fill="#0f6e56">sea level only</text>

<rect x="276" y="104" width="130" height="62" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="341" y="128" text-anchor="middle" fill="#085041">1</text>
<text class="ts" x="341" y="148" text-anchor="middle" fill="#0f6e56">HPC degradation</text>

<rect x="414" y="104" width="90" height="62" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="459" y="135" text-anchor="middle" fill="#085041">100</text>

<rect x="512" y="104" width="90" height="62" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="557" y="135" text-anchor="middle" fill="#085041">100</text>

<rect x="610" y="104" width="120" height="62" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="670" y="128" text-anchor="middle" fill="#085041">RUL_FD001.txt</text>
<text class="ts" x="670" y="148" text-anchor="middle" fill="#0f6e56">100 values</text>

<!-- FD002 row — amber (medium) -->
<rect x="40"  y="180" width="110" height="62" rx="4" fill="#FAC775" stroke="#854f0b" stroke-width="0.8"/>
<text class="th" x="95"  y="204" text-anchor="middle" fill="#412402">FD002</text>
<text class="ts" x="95"  y="224" text-anchor="middle" fill="#633806">medium</text>

<rect x="158" y="180" width="110" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="213" y="204" text-anchor="middle" fill="#412402">6</text>
<text class="ts" x="213" y="224" text-anchor="middle" fill="#854f0b">alt / Mach / TRA</text>

<rect x="276" y="180" width="130" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="341" y="204" text-anchor="middle" fill="#412402">1</text>
<text class="ts" x="341" y="224" text-anchor="middle" fill="#854f0b">HPC degradation</text>

<rect x="414" y="180" width="90" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="459" y="211" text-anchor="middle" fill="#412402">260</text>

<rect x="512" y="180" width="90" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="557" y="211" text-anchor="middle" fill="#412402">259</text>

<rect x="610" y="180" width="120" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="ts" x="670" y="204" text-anchor="middle" fill="#412402">RUL_FD002.txt</text>
<text class="ts" x="670" y="224" text-anchor="middle" fill="#854f0b">259 values</text>

<!-- FD003 row — amber (medium) -->
<rect x="40"  y="256" width="110" height="62" rx="4" fill="#FAC775" stroke="#854f0b" stroke-width="0.8"/>
<text class="th" x="95"  y="280" text-anchor="middle" fill="#412402">FD003</text>
<text class="ts" x="95"  y="300" text-anchor="middle" fill="#633806">medium</text>

<rect x="158" y="256" width="110" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="213" y="280" text-anchor="middle" fill="#412402">1</text>
<text class="ts" x="213" y="300" text-anchor="middle" fill="#854f0b">sea level only</text>

<rect x="276" y="256" width="130" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="341" y="280" text-anchor="middle" fill="#412402">2</text>
<text class="ts" x="341" y="300" text-anchor="middle" fill="#854f0b">HPC + Fan</text>

<rect x="414" y="256" width="90" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="459" y="287" text-anchor="middle" fill="#412402">100</text>

<rect x="512" y="256" width="90" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="th" x="557" y="287" text-anchor="middle" fill="#412402">100</text>

<rect x="610" y="256" width="120" height="62" rx="4" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="ts" x="670" y="280" text-anchor="middle" fill="#412402">RUL_FD003.txt</text>
<text class="ts" x="670" y="300" text-anchor="middle" fill="#854f0b">100 values</text>

<!-- FD004 row — coral (hardest) -->
<rect x="40"  y="332" width="110" height="62" rx="4" fill="#F0997B" stroke="#993c1d" stroke-width="1.2"/>
<text class="th" x="95"  y="356" text-anchor="middle" fill="#4A1B0C">FD004</text>
<text class="ts" x="95"  y="376" text-anchor="middle" fill="#712b13">hardest</text>

<rect x="158" y="332" width="110" height="62" rx="4" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="213" y="356" text-anchor="middle" fill="#4a1b0c">6</text>
<text class="ts" x="213" y="376" text-anchor="middle" fill="#712b13">alt / Mach / TRA</text>

<rect x="276" y="332" width="130" height="62" rx="4" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="341" y="356" text-anchor="middle" fill="#4a1b0c">2</text>
<text class="ts" x="341" y="376" text-anchor="middle" fill="#712b13">HPC + Fan</text>

<rect x="414" y="332" width="90" height="62" rx="4" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="459" y="363" text-anchor="middle" fill="#4a1b0c">248</text>

<rect x="512" y="332" width="90" height="62" rx="4" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text class="th" x="557" y="363" text-anchor="middle" fill="#4a1b0c">249</text>

<rect x="610" y="332" width="120" height="62" rx="4" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text class="ts" x="670" y="356" text-anchor="middle" fill="#4a1b0c">RUL_FD004.txt</text>
<text class="ts" x="670" y="376" text-anchor="middle" fill="#712b13">249 values</text>

<!-- Difficulty arrow -->
<line x1="758" y1="112" x2="758" y2="378" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" font-family="Arial, sans-serif" fill="#888780" x="776" y="245" text-anchor="start" transform="rotate(90,776,245)">increasing difficulty</text>

<!-- Axes labels -->
<text class="ts" x="40" y="422" text-anchor="start" fill="#5f5e5a">Conditions axis:   FD001/FD003 (1 condition)   vs   FD002/FD004 (6 conditions)</text>
<text class="ts" x="40" y="442" text-anchor="start" fill="#5f5e5a">Fault mode axis:   FD001/FD002 (1 fault mode)  vs   FD003/FD004 (2 fault modes)</text>

<!-- File inventory -->
<line x1="40" y1="458" x2="740" y2="458" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="40" y="476" text-anchor="start" fill="#5f5e5a">Files per sub-dataset:   train_FDxxx.txt     test_FDxxx.txt     RUL_FDxxx.txt     (12 files total)</text>
<text class="ts" x="40" y="496" text-anchor="start" fill="#888780">26 columns in train/test (unit, cycle, 3 op settings, 21 sensors).  RUL file: one integer per engine.</text>
</svg>
