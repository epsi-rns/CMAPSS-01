<svg width="680" height="530" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Condition-wise normalization pipeline</title>
<desc>Six-step flowchart for normalizing C-MAPSS sensor data for multi-condition sub-datasets. Steps: raw sensor values, cluster by op settings, identify 6 clusters, compute per-cluster stats from healthy cycles, normalize each reading, output condition-normalized values.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- Step 1: raw values -->
<rect x="190" y="30" width="300" height="56" rx="6" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Raw sensor values</text>
<text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">26 columns, all 4 sub-datasets</text>
<line x1="340" y1="86" x2="340" y2="106" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="56" text-anchor="start">applies to FD002, FD004</text>
<text class="ts" x="500" y="70" text-anchor="start">(multi-condition only)</text>
<line x1="492" y1="60" x2="494" y2="60" stroke="#b4b2a9" stroke-width="0.5"/>

<!-- Step 2: cluster -->
<rect x="190" y="108" width="300" height="56" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central" fill="#085041">Cluster by op settings</text>
<text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">group on (op_setting_1, 2, 3)</text>
<line x1="340" y1="164" x2="340" y2="184" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 3: 6 clusters -->
<rect x="190" y="186" width="300" height="56" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central" fill="#085041">6 clusters identified</text>
<text class="ts" x="340" y="226" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">each = one flight condition</text>

<!-- Cluster pills -->
<rect x="60"  y="196" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="78"  y="211" text-anchor="middle" dominant-baseline="central" fill="#085041">C1</text>
<rect x="102" y="196" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="120" y="211" text-anchor="middle" dominant-baseline="central" fill="#085041">C2</text>
<rect x="60"  y="222" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="78"  y="237" text-anchor="middle" dominant-baseline="central" fill="#085041">C3</text>
<rect x="102" y="222" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="120" y="237" text-anchor="middle" dominant-baseline="central" fill="#085041">C4</text>
<rect x="60"  y="248" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="78"  y="263" text-anchor="middle" dominant-baseline="central" fill="#085041">C5</text>
<rect x="102" y="248" width="36" height="22" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="120" y="263" text-anchor="middle" dominant-baseline="central" fill="#085041">C6</text>
<line x1="155" y1="220" x2="188" y2="214" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="340" y1="242" x2="340" y2="262" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 4: compute stats -->
<rect x="190" y="264" width="300" height="56" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="340" y="283" text-anchor="middle" dominant-baseline="central" fill="#26215c">Compute per-cluster stats</text>
<text class="ts" x="340" y="301" text-anchor="middle" dominant-baseline="central" fill="#534ab7">mean and std from early (healthy) cycles</text>
<text class="ts" x="500" y="278" text-anchor="start">for each sensor:</text>
<text class="ts" x="500" y="292" text-anchor="start">mu_c = mean(healthy)</text>
<text class="ts" x="500" y="306" text-anchor="start">sigma_c = std(healthy)</text>
<line x1="492" y1="284" x2="494" y2="284" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="340" y1="320" x2="340" y2="340" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 5: normalize -->
<rect x="190" y="342" width="300" height="56" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text class="th" x="340" y="361" text-anchor="middle" dominant-baseline="central" fill="#26215c">Normalize each reading</text>
<text class="ts" x="340" y="379" text-anchor="middle" dominant-baseline="central" fill="#534ab7">x_norm = (x - mu_c) / sigma_c</text>
<line x1="340" y1="398" x2="340" y2="418" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 6: output -->
<rect x="190" y="420" width="300" height="56" rx="6" fill="#faeeda" stroke="#854f0b" stroke-width="1"/>
<text class="th" x="340" y="442" text-anchor="middle" dominant-baseline="central" fill="#412402">Condition-normalized values</text>
<text class="ts" x="340" y="460" text-anchor="middle" dominant-baseline="central" fill="#854f0b">comparable across operating points</text>
<text class="ts" x="500" y="436" text-anchor="start">values now express:</text>
<text class="ts" x="500" y="450" text-anchor="start">deviation from healthy</text>
<text class="ts" x="500" y="464" text-anchor="start">at that condition</text>
<line x1="492" y1="442" x2="494" y2="442" stroke="#b4b2a9" stroke-width="0.5"/>

<!-- FD001/FD003 note -->
<rect x="58" y="420" width="124" height="56" rx="6" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.5"/>
<text class="ts" x="120" y="441" text-anchor="middle">FD001/FD003:</text>
<text class="ts" x="120" y="456" text-anchor="middle">single condition,</text>
<text class="ts" x="120" y="471" text-anchor="middle">global norm ok</text>
<line x1="155" y1="448" x2="188" y2="448" stroke="#b4b2a9" stroke-width="0.5"/>

<!-- Footer note -->
<text class="ts" x="190" y="498" text-anchor="start">Note: "healthy cycles" = early cycles of training engines, before degradation accelerates.</text>
</svg>
