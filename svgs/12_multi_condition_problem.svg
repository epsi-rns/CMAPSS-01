<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multi-condition problem in FD002 and FD004</title>
<desc>Two panels. Top: raw T2 sensor values jumping between six condition bands — uninterpretable as health signal. Bottom: after condition-wise normalization, values cluster near zero and a degradation drift becomes visible.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <clipPath id="topclip"><rect x="80" y="30"  width="520" height="120"/></clipPath>
  <clipPath id="botclip"><rect x="80" y="215" width="520" height="120"/></clipPath>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- TOP PANEL: raw sensor -->
<text class="th" x="80" y="24" text-anchor="start">Raw T2 (fan inlet temperature) — FD002</text>

<line x1="80" y1="150" x2="610" y2="150" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="80" y1="150" x2="80"  y2="22"  stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="345" y="168" text-anchor="middle">Cycles</text>
<text class="ts" x="62"  y="90"  text-anchor="end" transform="rotate(-90,62,90)">T2 (deg R)</text>

<!-- Six condition band gridlines -->
<line x1="81" y1="50"  x2="600" y2="50"  stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>
<line x1="81" y1="66"  x2="600" y2="66"  stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>
<line x1="81" y1="82"  x2="600" y2="82"  stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>
<line x1="81" y1="98"  x2="600" y2="98"  stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>
<line x1="81" y1="114" x2="600" y2="114" stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>
<line x1="81" y1="130" x2="600" y2="130" stroke="#d3d1c7" stroke-width="0.4" stroke-dasharray="3 3"/>

<!-- Raw signal jumping between bands -->
<polyline clip-path="url(#topclip)" fill="none" stroke="#185FA5" stroke-width="1.2" opacity="0.8"
  points="80,130 92,50 104,98 116,66 128,114 140,82 152,50 164,130 176,98 188,66
          200,114 212,50 224,82 236,130 248,66 260,98 272,50 284,114 296,82 308,66
          320,130 332,50 344,98 356,82 368,114 380,66 392,50 404,130 416,98 428,66
          440,82 452,114 464,50 476,98 488,66 500,130 512,82 524,50 536,114 548,98
          560,66 572,82 584,50 596,114"/>

<!-- Band labels -->
<text class="ts" x="606" y="54"  text-anchor="start">cond 1</text>
<text class="ts" x="606" y="70"  text-anchor="start">cond 2</text>
<text class="ts" x="606" y="86"  text-anchor="start">cond 3</text>
<text class="ts" x="606" y="102" text-anchor="start">cond 4</text>
<text class="ts" x="606" y="118" text-anchor="start">cond 5</text>
<text class="ts" x="606" y="134" text-anchor="start">cond 6</text>

<!-- Annotation box -->
<rect x="170" y="34" width="220" height="28" rx="4" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text class="ts" x="280" y="46" text-anchor="middle" fill="#0c447c">same sensor, same engine —</text>
<text class="ts" x="280" y="59" text-anchor="middle" fill="#0c447c">values jump due to condition switching</text>

<!-- BOTTOM PANEL: normalized -->
<text class="th" x="80" y="208" text-anchor="start">After condition-wise normalization</text>

<line x1="80" y1="335" x2="610" y2="335" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="80" y1="335" x2="80"  y2="207" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="345" y="353" text-anchor="middle">Cycles</text>
<text class="ts" x="62"  y="270" text-anchor="end" transform="rotate(-90,62,270)">Normalized</text>

<!-- Zero line -->
<line x1="81" y1="270" x2="600" y2="270" stroke="#d3d1c7" stroke-width="0.6" stroke-dasharray="4 4"/>
<text class="ts" x="72" y="274" text-anchor="end">0</text>

<!-- Normalized signal: noisy flat then drifts -->
<polyline clip-path="url(#botclip)" fill="none" stroke="#0F6E56" stroke-width="1.4"
  points="80,268 92,272 104,265 116,274 128,269 140,271 152,267 164,273 176,270 188,266
          200,272 212,268 224,274 236,270 248,265 260,271 272,269 284,273 296,268 308,272
          320,275 332,270 344,274 356,272 368,276 380,273 392,278 404,274 416,279 428,276
          440,281 452,278 464,283 476,281 488,285 500,283 512,288 524,286 536,290 548,289
          560,293 572,292 584,296 596,298"/>

<!-- Trend line -->
<line x1="200" y1="270" x2="560" y2="295" stroke="#0f6e56" stroke-width="0.8" stroke-dasharray="6 3" opacity="0.6"/>
<text class="ts" x="420" y="310" text-anchor="middle" fill="#085041">degradation trend</text>
<text class="ts" x="420" y="323" text-anchor="middle" fill="#085041">now visible</text>

<!-- Annotation box -->
<rect x="128" y="216" width="244" height="28" rx="4" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="250" y="228" text-anchor="middle" fill="#085041">condition noise removed —</text>
<text class="ts" x="250" y="241" text-anchor="middle" fill="#085041">health signal becomes interpretable</text>
</svg>
