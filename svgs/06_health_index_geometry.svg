<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Health index geometry in flow-efficiency space</title>
<desc>2D plane with efficiency loss on x-axis and flow loss on y-axis. Contour lines show health margin landscape. Three degradation trajectories move from healthy origin toward failure boundary. Health index equals the minimum margin at any point.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
</style>

<!-- Axes -->
<line x1="80" y1="340" x2="580" y2="340" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="80" y1="340" x2="80"  y2="40"  stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Axis labels -->
<text class="ts" x="330" y="370" text-anchor="middle">Efficiency loss →</text>
<text class="ts" x="32"  y="190" text-anchor="middle" transform="rotate(-90,32,190)">Flow loss →</text>

<!-- Tick labels -->
<text class="ts" x="80"  y="356" text-anchor="middle">0</text>
<text class="ts" x="205" y="356" text-anchor="middle">−4%</text>
<text class="ts" x="330" y="356" text-anchor="middle">−8%</text>
<text class="ts" x="455" y="356" text-anchor="middle">−12%</text>
<text class="ts" x="68"  y="270" text-anchor="end">−4%</text>
<text class="ts" x="68"  y="190" text-anchor="end">−8%</text>
<text class="ts" x="68"  y="110" text-anchor="end">−12%</text>

<!-- Contour lines -->
<path fill="none" stroke="#9FE1CB" stroke-width="0.8" opacity="0.7" d="M80,310 C180,305 280,295 400,280 S520,260 570,245"/>
<path fill="none" stroke="#5DCAA5" stroke-width="0.8" opacity="0.7" d="M80,275 C170,268 270,255 390,235 S510,210 565,195"/>
<path fill="none" stroke="#1D9E75" stroke-width="0.8" opacity="0.7" d="M80,240 C160,230 255,215 375,190 S500,160 560,145"/>
<path fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.7" d="M80,200 C150,188 245,170 360,143 S490,110 555,95"/>
<path fill="none" stroke="#085041" stroke-width="0.8" opacity="0.6" d="M80,158 C140,144 235,122 345,94  S480,62  548,50"/>

<!-- Contour labels -->
<text class="ts" x="575" y="250" text-anchor="start">H=0.8</text>
<text class="ts" x="575" y="200" text-anchor="start">H=0.6</text>
<text class="ts" x="575" y="150" text-anchor="start">H=0.4</text>
<text class="ts" x="575" y="100" text-anchor="start">H=0.2</text>

<!-- Failure region -->
<rect x="370" y="50" width="190" height="110" rx="6" fill="#faece7" fill-opacity="0.7" stroke="#d85a30" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="ts" x="465" y="100" text-anchor="middle" fill="#712b13">Failure region</text>
<text class="ts" x="465" y="116" text-anchor="middle" fill="#712b13">H(t) = 0</text>

<!-- Healthy start -->
<circle cx="90" cy="330" r="6" fill="#185FA5" stroke="white" stroke-width="1.5"/>
<text class="ts" x="100" y="325" text-anchor="start" fill="#0C447C">healthy start</text>

<!-- Trajectory 1: efficiency-dominant -->
<path fill="none" stroke="#185FA5" stroke-width="1.8"
  d="M90,330 C120,320 180,300 250,270 S360,220 420,160 S460,110 470,80"/>
<circle cx="470" cy="80" r="4" fill="#185FA5"/>

<!-- Trajectory 2: balanced -->
<path fill="none" stroke="#534AB7" stroke-width="1.8"
  d="M90,330 C130,315 210,285 300,245 S420,195 460,140 S490,100 500,78"/>
<circle cx="500" cy="78" r="4" fill="#534AB7"/>

<!-- Trajectory 3: flow-dominant -->
<path fill="none" stroke="#993C1D" stroke-width="1.8"
  d="M90,330 C105,300 120,260 140,220 S175,170 210,140 S290,100 390,72"/>
<circle cx="390" cy="72" r="4" fill="#993C1D"/>

<!-- Direction arrows -->
<line x1="195" y1="290" x2="215" y2="280" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="210" y1="270" x2="228" y2="258" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="148" y1="235" x2="155" y2="215" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="82" y="42" width="214" height="78" rx="4" fill="white" fill-opacity="0.92" stroke="#d3d1c7" stroke-width="0.5"/>
<text class="ts" x="92" y="60">Three degradation trajectories:</text>
<line x1="92" y1="74" x2="116" y2="74" stroke="#185FA5" stroke-width="1.8"/>
<text class="ts" x="122" y="78">efficiency-dominant</text>
<line x1="92" y1="90" x2="116" y2="90" stroke="#534AB7" stroke-width="1.8"/>
<text class="ts" x="122" y="94">balanced loss</text>
<line x1="92" y1="106" x2="116" y2="106" stroke="#993C1D" stroke-width="1.8"/>
<text class="ts" x="122" y="110">flow-dominant</text>
</svg>
