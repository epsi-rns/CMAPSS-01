<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>KMeans algorithm steps on C-MAPSS data</title>
<desc>Four panels: random init, assign to nearest centroid, recompute centroids, converged. Because C-MAPSS uses 6 exact discrete flight points, centroids land exactly on data points after convergence.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- Step headers -->
<text class="th" x="90"  y="28" text-anchor="middle">Step 1</text>
<text class="ts" x="90"  y="44" text-anchor="middle">random init</text>
<text class="th" x="255" y="28" text-anchor="middle">Step 2</text>
<text class="ts" x="255" y="44" text-anchor="middle">assign to nearest</text>
<text class="th" x="420" y="28" text-anchor="middle">Step 3</text>
<text class="ts" x="420" y="44" text-anchor="middle">recompute centroids</text>
<text class="th" x="585" y="28" text-anchor="middle">Step 4</text>
<text class="ts" x="585" y="44" text-anchor="middle">converged</text>

<!-- arrows between panels -->
<line x1="148" y1="200" x2="168" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="313" y1="200" x2="333" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="478" y1="200" x2="498" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- PANEL 1: random init -->
<rect x="40" y="56" width="110" height="290" rx="6" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
<!-- data dots (all gray, not yet assigned) -->
<circle cx="55"  cy="310" r="4" fill="#888780" opacity="0.5"/>
<circle cx="57"  cy="308" r="4" fill="#888780" opacity="0.5"/>
<circle cx="62"  cy="270" r="4" fill="#888780" opacity="0.5"/>
<circle cx="64"  cy="268" r="4" fill="#888780" opacity="0.5"/>
<circle cx="75"  cy="230" r="4" fill="#888780" opacity="0.5"/>
<circle cx="77"  cy="228" r="4" fill="#888780" opacity="0.5"/>
<circle cx="85"  cy="200" r="4" fill="#888780" opacity="0.5"/>
<circle cx="83"  cy="202" r="4" fill="#888780" opacity="0.5"/>
<circle cx="100" cy="165" r="4" fill="#888780" opacity="0.5"/>
<circle cx="102" cy="163" r="4" fill="#888780" opacity="0.5"/>
<circle cx="115" cy="135" r="4" fill="#888780" opacity="0.5"/>
<circle cx="117" cy="133" r="4" fill="#888780" opacity="0.5"/>
<!-- random centroids as X marks -->
<line x1="61"  y1="283" x2="69"  y2="291" stroke="#D85A30" stroke-width="2"/>
<line x1="69"  y1="283" x2="61"  y2="291" stroke="#D85A30" stroke-width="2"/>
<line x1="90"  y1="180" x2="98"  y2="188" stroke="#534AB7" stroke-width="2"/>
<line x1="98"  y1="180" x2="90"  y2="188" stroke="#534AB7" stroke-width="2"/>
<line x1="70"  y1="250" x2="78"  y2="258" stroke="#BA7517" stroke-width="2"/>
<line x1="78"  y1="250" x2="70"  y2="258" stroke="#BA7517" stroke-width="2"/>
<line x1="108" y1="148" x2="116" y2="156" stroke="#185FA5" stroke-width="2"/>
<line x1="116" y1="148" x2="108" y2="156" stroke="#185FA5" stroke-width="2"/>
<line x1="50"  y1="295" x2="58"  y2="303" stroke="#0F6E56" stroke-width="2"/>
<line x1="58"  y1="295" x2="50"  y2="303" stroke="#0F6E56" stroke-width="2"/>
<line x1="95"  y1="148" x2="103" y2="156" stroke="#993C1D" stroke-width="2"/>
<line x1="103" y1="148" x2="95"  y2="156" stroke="#993C1D" stroke-width="2"/>
<text class="ts" x="95" y="360" text-anchor="middle">centroids X placed randomly</text>

<!-- PANEL 2: assign -->
<rect x="205" y="56" width="110" height="290" rx="6" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
<!-- data dots colored by nearest centroid -->
<circle cx="220" cy="310" r="5" fill="#1D9E75"/>
<circle cx="222" cy="308" r="5" fill="#1D9E75"/>
<circle cx="227" cy="270" r="5" fill="#BA7517"/>
<circle cx="229" cy="268" r="5" fill="#BA7517"/>
<circle cx="240" cy="230" r="5" fill="#534AB7"/>
<circle cx="242" cy="228" r="5" fill="#534AB7"/>
<circle cx="250" cy="200" r="5" fill="#D85A30"/>
<circle cx="248" cy="202" r="5" fill="#D85A30"/>
<circle cx="265" cy="165" r="5" fill="#185FA5"/>
<circle cx="267" cy="163" r="5" fill="#185FA5"/>
<circle cx="280" cy="135" r="5" fill="#993C1D"/>
<circle cx="282" cy="133" r="5" fill="#993C1D"/>
<!-- dashed assignment lines -->
<line x1="221" y1="309" x2="223" y2="287" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="228" y1="269" x2="238" y2="248" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="241" y1="229" x2="254" y2="208" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="249" y1="201" x2="268" y2="172" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="266" y1="164" x2="279" y2="148" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 2"/>
<text class="ts" x="260" y="360" text-anchor="middle">each point → nearest centroid</text>

<!-- PANEL 3: recompute -->
<rect x="370" y="56" width="110" height="290" rx="6" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
<circle cx="385" cy="310" r="5" fill="#1D9E75"/>
<circle cx="387" cy="308" r="5" fill="#1D9E75"/>
<circle cx="392" cy="270" r="5" fill="#BA7517"/>
<circle cx="394" cy="268" r="5" fill="#BA7517"/>
<circle cx="405" cy="230" r="5" fill="#534AB7"/>
<circle cx="407" cy="228" r="5" fill="#534AB7"/>
<circle cx="415" cy="200" r="5" fill="#D85A30"/>
<circle cx="413" cy="202" r="5" fill="#D85A30"/>
<circle cx="430" cy="165" r="5" fill="#185FA5"/>
<circle cx="432" cy="163" r="5" fill="#185FA5"/>
<circle cx="445" cy="135" r="5" fill="#993C1D"/>
<circle cx="447" cy="133" r="5" fill="#993C1D"/>
<!-- arrows showing centroids moving toward true points -->
<line x1="388" y1="297" x2="386" y2="311" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="396" y1="256" x2="393" y2="270" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="408" y1="218" x2="406" y2="230" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="418" y1="190" x2="414" y2="202" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="433" y1="153" x2="431" y2="165" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="448" y1="121" x2="446" y2="135" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="425" y="360" text-anchor="middle">centroids move to cluster mean</text>

<!-- PANEL 4: converged -->
<rect x="535" y="56" width="110" height="290" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
<!-- dots + circles coincide exactly -->
<circle cx="550" cy="310" r="5" fill="#1D9E75"/>
<circle cx="552" cy="308" r="5" fill="#1D9E75"/>
<circle cx="550" cy="310" r="11" fill="none" stroke="#085041" stroke-width="1.5"/>
<circle cx="557" cy="270" r="5" fill="#BA7517"/>
<circle cx="559" cy="268" r="5" fill="#BA7517"/>
<circle cx="557" cy="270" r="11" fill="none" stroke="#633806" stroke-width="1.5"/>
<circle cx="570" cy="230" r="5" fill="#534AB7"/>
<circle cx="572" cy="228" r="5" fill="#534AB7"/>
<circle cx="570" cy="230" r="11" fill="none" stroke="#3C3489" stroke-width="1.5"/>
<circle cx="580" cy="200" r="5" fill="#D85A30"/>
<circle cx="578" cy="202" r="5" fill="#D85A30"/>
<circle cx="580" cy="200" r="11" fill="none" stroke="#712B13" stroke-width="1.5"/>
<circle cx="595" cy="165" r="5" fill="#185FA5"/>
<circle cx="597" cy="163" r="5" fill="#185FA5"/>
<circle cx="595" cy="165" r="11" fill="none" stroke="#0C447C" stroke-width="1.5"/>
<circle cx="610" cy="135" r="5" fill="#444441"/>
<circle cx="612" cy="133" r="5" fill="#444441"/>
<circle cx="610" cy="135" r="11" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
<text class="ts" x="590" y="360" text-anchor="middle">centroid = point, inertia ≈ 0</text>

<!-- bottom summary -->
<line x1="40" y1="390" x2="640" y2="390" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="340" y="412" text-anchor="middle">Because C-MAPSS snaps to 6 exact flight points, each cluster has near-zero spread.</text>
<text class="ts" x="340" y="430" text-anchor="middle">KMeans converges in few iterations. The centroid IS the flight point — not an approximation.</text>
<text class="ts" x="340" y="448" text-anchor="middle">This is why inertia = 0.41 (near zero) and every engine sees all 6 conditions exactly.</text>
</svg>
