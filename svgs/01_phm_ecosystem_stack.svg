<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>PHM ecosystem stack</title>
<desc>Five-layer stack: Sensing, Anomaly detection, Diagnostics, Prognostics (highlighted), Decision making. Right column shows the question each layer answers.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .box-gray  { fill: #f1efe8; stroke: #5f5e5a; }
  .box-amber { fill: #faeeda; stroke: #854f0b; }
  .box-teal  { fill: #e1f5ee; stroke: #0f6e56; }
</style>

<!-- Decision making -->
<rect x="60" y="58" width="360" height="50" rx="6" stroke-width="0.5" class="box-gray"/>
<text class="th" x="240" y="79" text-anchor="middle" dominant-baseline="central">Decision making</text>
<text class="ts" x="240" y="97" text-anchor="middle" dominant-baseline="central">maintenance + operational planning</text>
<line x1="240" y1="108" x2="240" y2="126" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Prognostics — highlighted -->
<rect x="60" y="128" width="360" height="50" rx="8" stroke-width="1.5" class="box-amber"/>
<text class="th" x="240" y="149" text-anchor="middle" dominant-baseline="central" fill="#412402">Prognostics</text>
<text class="ts" x="240" y="167" text-anchor="middle" dominant-baseline="central" fill="#854f0b">how long until failure — this paper</text>
<line x1="240" y1="178" x2="240" y2="196" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Diagnostics -->
<rect x="60" y="198" width="360" height="50" rx="6" stroke-width="0.5" class="box-teal"/>
<text class="th" x="240" y="219" text-anchor="middle" dominant-baseline="central" fill="#085041">Diagnostics</text>
<text class="ts" x="240" y="237" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">what changed and why</text>
<line x1="240" y1="248" x2="240" y2="266" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Anomaly detection -->
<rect x="60" y="268" width="360" height="50" rx="6" stroke-width="0.5" class="box-gray"/>
<text class="th" x="240" y="289" text-anchor="middle" dominant-baseline="central">Anomaly detection</text>
<text class="ts" x="240" y="307" text-anchor="middle" dominant-baseline="central">something has changed</text>
<line x1="240" y1="318" x2="240" y2="336" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Sensing -->
<rect x="60" y="338" width="360" height="50" rx="6" stroke-width="0.5" class="box-gray"/>
<text class="th" x="240" y="359" text-anchor="middle" dominant-baseline="central">Sensing</text>
<text class="ts" x="240" y="377" text-anchor="middle" dominant-baseline="central">raw sensor data collection</text>

<!-- Right column questions -->
<text class="ts" x="450" y="87"  text-anchor="start">What do we do?</text>
<text class="ts" x="450" y="157" text-anchor="start">How long is left?</text>
<text class="ts" x="450" y="227" text-anchor="start">What is wrong?</text>
<text class="ts" x="450" y="297" text-anchor="start">Is something wrong?</text>
<text class="ts" x="450" y="367" text-anchor="start">What are the readings?</text>

<!-- Bracket tick marks -->
<line x1="424" y1="62"  x2="444" y2="62"  stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="108" x2="444" y2="108" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="132" x2="444" y2="132" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="178" x2="444" y2="178" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="202" x2="444" y2="202" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="248" x2="444" y2="248" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="272" x2="444" y2="272" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="318" x2="444" y2="318" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="342" x2="444" y2="342" stroke="#b4b2a9" stroke-width="0.5"/>
<line x1="424" y1="388" x2="444" y2="388" stroke="#b4b2a9" stroke-width="0.5"/>

<!-- PHM bracket label -->
<rect x="30" y="40" width="22" height="348" rx="4" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-size="11" font-family="sans-serif" fill="#888780" x="41" y="215" text-anchor="middle" transform="rotate(-90,41,215)">PHM = Prognostics and Health Management</text>
</svg>
