<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>C-MAPSS simulation pipeline flowchart</title>
<desc>Full data generation loop. Choose random parameters, run C-MAPSS one cycle, record sensors, compute health index, check failure threshold, add noise, loop back. When failure reached, store one complete engine life. Repeat N times to build dataset.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
</style>

<!-- Step 1: choose parameters -->
<rect x="215" y="40" width="250" height="56" rx="6" stroke-width="0.5" fill="#f1efe8" stroke="#5f5e5a"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">Choose parameters</text>
<text class="ts" x="340" y="80" text-anchor="middle" dominant-baseline="central">e0, f0, ak, bk drawn randomly</text>
<line x1="340" y1="96" x2="340" y2="116" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 2: run C-MAPSS -->
<rect x="215" y="118" width="250" height="56" rx="6" stroke-width="0.5" fill="#eeedfe" stroke="#534ab7"/>
<text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#26215c">Run C-MAPSS — one cycle</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central" fill="#534ab7">closed-loop thermodynamic sim</text>
<line x1="340" y1="174" x2="340" y2="194" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 3: record sensors -->
<rect x="215" y="196" width="250" height="56" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central" fill="#085041">Record sensor outputs</text>
<text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">21 variables: T, P, RPM, BPR …</text>
<line x1="340" y1="252" x2="340" y2="272" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Step 4: compute health index -->
<rect x="215" y="274" width="250" height="56" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central" fill="#085041">Compute health index</text>
<text class="ts" x="340" y="314" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">H(t) = min(mFan, mHPC, mLPC, mEGT)</text>
<line x1="340" y1="330" x2="340" y2="350" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Decision: H = 0? -->
<rect x="215" y="352" width="250" height="56" rx="8" stroke-width="1.2" fill="#faeeda" stroke="#854f0b"/>
<text class="th" x="340" y="374" text-anchor="middle" dominant-baseline="central" fill="#412402">H(t) = 0 ?</text>
<text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#854f0b">failure threshold reached</text>

<!-- YES branch — down -->
<line x1="340" y1="408" x2="340" y2="428" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="422" text-anchor="start">yes</text>

<!-- Step 5: store trajectory -->
<rect x="215" y="430" width="250" height="56" rx="6" stroke-width="0.5" fill="#faece7" stroke="#993c1d"/>
<text class="th" x="340" y="452" text-anchor="middle" dominant-baseline="central" fill="#4a1b0c">Store engine life</text>
<text class="ts" x="340" y="470" text-anchor="middle" dominant-baseline="central" fill="#712b13">one run-to-failure trajectory</text>
<line x1="340" y1="486" x2="340" y2="506" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Dataset -->
<rect x="215" y="508" width="250" height="44" rx="6" stroke-width="0.5" fill="#f1efe8" stroke="#5f5e5a"/>
<text class="th" x="340" y="534" text-anchor="middle" dominant-baseline="central">Repeat for N engines → dataset</text>

<!-- NO branch — right, up, back -->
<line x1="465" y1="380" x2="542" y2="380" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="470" y="373" text-anchor="start">no</text>

<!-- Add noise box -->
<rect x="544" y="352" width="106" height="56" rx="6" stroke-width="0.5" fill="#f1efe8" stroke="#5f5e5a"/>
<text class="th" x="597" y="374" text-anchor="middle" dominant-baseline="central">Add noise</text>
<text class="ts" x="597" y="392" text-anchor="middle" dominant-baseline="central">process + sensor</text>

<!-- Loop back up: from noise box top, up to C-MAPSS input -->
<path fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"
  d="M597,352 L597,157 L467,157"/>

<!-- t increment label -->
<text class="ts" x="608" y="260" text-anchor="start">t = t + 1</text>
</svg>
