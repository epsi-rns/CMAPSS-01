<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>C-MAPSS turbofan engine schematic</title>
<desc>Air flows left to right through five rotating modules: Fan, LPC, HPC (degraded, highlighted in amber), HPT, LPT. Combustor sits between HPC and HPT. Health modifiers enter from top, sensor outputs exit at bottom.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
</style>

<!-- Air flow label -->
<text class="ts" x="340" y="26" text-anchor="middle">Air flow →</text>

<!-- Inlet arrow -->
<line x1="30" y1="165" x2="72" y2="165" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="18" y="158" text-anchor="middle">Inlet</text>
<text class="ts" x="18" y="172" text-anchor="middle">air</text>

<!-- Fan -->
<rect x="76" y="130" width="72" height="70" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="112" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">Fan</text>
<text class="ts" x="112" y="178" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">bypass + core</text>
<line x1="148" y1="165" x2="168" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- LPC -->
<rect x="170" y="130" width="72" height="70" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="206" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">LPC</text>
<text class="ts" x="206" y="178" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">low pressure</text>
<line x1="242" y1="165" x2="262" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- HPC — highlighted amber -->
<rect x="264" y="122" width="78" height="86" rx="6" stroke-width="1.5" fill="#faeeda" stroke="#854f0b"/>
<text class="th" x="303" y="152" text-anchor="middle" dominant-baseline="central" fill="#412402">HPC</text>
<text class="ts" x="303" y="170" text-anchor="middle" dominant-baseline="central" fill="#854f0b">high pressure</text>
<text class="ts" x="303" y="188" text-anchor="middle" dominant-baseline="central" fill="#993c1d">degraded ★</text>
<line x1="342" y1="165" x2="362" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Combustor -->
<rect x="364" y="138" width="62" height="54" rx="6" stroke-width="0.5" fill="#faece7" stroke="#993c1d"/>
<text class="th" x="395" y="160" text-anchor="middle" dominant-baseline="central" fill="#4a1b0c">Burner</text>
<text class="ts" x="395" y="178" text-anchor="middle" dominant-baseline="central" fill="#712b13">combustion</text>

<!-- Fuel arrow -->
<line x1="395" y1="108" x2="395" y2="136" stroke="#993c1d" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="395" y="100" text-anchor="middle" fill="#712b13">Fuel (Wf)</text>
<line x1="426" y1="165" x2="446" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- HPT -->
<rect x="448" y="130" width="72" height="70" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="484" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">HPT</text>
<text class="ts" x="484" y="178" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">high pressure</text>
<line x1="520" y1="165" x2="540" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- LPT -->
<rect x="542" y="130" width="72" height="70" rx="6" stroke-width="0.5" fill="#e1f5ee" stroke="#0f6e56"/>
<text class="th" x="578" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">LPT</text>
<text class="ts" x="578" y="178" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">low pressure</text>
<line x1="614" y1="165" x2="648" y2="165" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="656" y="161" text-anchor="start">Exhaust</text>

<!-- Divider -->
<line x1="40" y1="240" x2="640" y2="240" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Labels -->
<text class="ts" x="340" y="258" text-anchor="middle">Health parameter inputs (per module: efficiency modifier + flow modifier)</text>
<text class="ts" x="180" y="283" text-anchor="middle">Sensor outputs: T2, T24, T30, T50, P2, P15, P30 …</text>
<text class="ts" x="180" y="300" text-anchor="middle">Nf, Nc, epr, Ps30, BPR, farB, NRf, NRc …</text>
<text class="ts" x="510" y="283" text-anchor="middle">Margins (hidden):</text>
<text class="ts" x="510" y="300" text-anchor="middle">SmFan, SmLPC, SmHPC, EGT</text>

<!-- Health index -->
<rect x="420" y="318" width="200" height="36" rx="6" stroke-width="0.5" fill="#faece7" stroke="#993c1d"/>
<text class="th" x="520" y="340" text-anchor="middle" dominant-baseline="central" fill="#4a1b0c">H(t) = min(margins)</text>

<!-- Section labels -->
<line x1="170" y1="118" x2="342" y2="118" stroke="#d3d1c7" stroke-width="0.5"/>
<text class="ts" x="256" y="112" text-anchor="middle">Compressor section</text>
<line x1="448" y1="118" x2="614" y2="118" stroke="#d3d1c7" stroke-width="0.5"/>
<text class="ts" x="531" y="112" text-anchor="middle">Turbine section</text>
</svg>
