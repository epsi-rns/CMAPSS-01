<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Why KMeans finds exact points: discrete vs fuzzy clusters</title>
<desc>Two panels. Left: typical fuzzy clustering with scattered points. Right: C-MAPSS situation where all points snap to exactly 6 discrete locations — KMeans trivially recovers exact points.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- LEFT PANEL -->
<rect x="40" y="40" width="270" height="270" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text class="th" x="175" y="60" text-anchor="middle">Typical clustering problem</text>
<text class="ts" x="175" y="76" text-anchor="middle">fuzzy — approximate centroids</text>

<!-- fuzzy cloud 1 teal -->
<circle cx="110" cy="140" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="125" cy="155" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="100" cy="160" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="118" cy="170" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="95"  cy="145" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="130" cy="135" r="5" fill="#1D9E75" opacity="0.7"/>
<circle cx="108" cy="180" r="5" fill="#1D9E75" opacity="0.5"/>
<circle cx="111" cy="155" r="11" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="90" y="205" text-anchor="middle" fill="#085041">centroid ≈</text>

<!-- fuzzy cloud 2 amber -->
<circle cx="210" cy="130" r="5" fill="#BA7517" opacity="0.7"/>
<circle cx="225" cy="145" r="5" fill="#BA7517" opacity="0.7"/>
<circle cx="200" cy="150" r="5" fill="#BA7517" opacity="0.7"/>
<circle cx="220" cy="160" r="5" fill="#BA7517" opacity="0.7"/>
<circle cx="235" cy="135" r="5" fill="#BA7517" opacity="0.7"/>
<circle cx="215" cy="170" r="5" fill="#BA7517" opacity="0.5"/>
<circle cx="195" cy="140" r="5" fill="#BA7517" opacity="0.5"/>
<circle cx="228" cy="118" r="5" fill="#BA7517" opacity="0.4"/>
<circle cx="240" cy="155" r="5" fill="#BA7517" opacity="0.4"/>
<circle cx="218" cy="148" r="11" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="218" y="205" text-anchor="middle" fill="#633806">centroid ≈</text>

<!-- fuzzy cloud 3 purple -->
<circle cx="140" cy="250" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="155" cy="240" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="150" cy="265" r="5" fill="#7F77DD" opacity="0.6"/>
<circle cx="165" cy="255" r="5" fill="#7F77DD" opacity="0.6"/>
<circle cx="135" cy="265" r="5" fill="#7F77DD" opacity="0.5"/>
<circle cx="170" cy="245" r="5" fill="#7F77DD" opacity="0.5"/>
<circle cx="145" cy="278" r="5" fill="#7F77DD" opacity="0.4"/>
<circle cx="125" cy="242" r="5" fill="#7F77DD" opacity="0.4"/>
<circle cx="149" cy="256" r="11" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="150" y="305" text-anchor="middle" fill="#3C3489">centroid ≈</text>

<text class="ts" x="175" y="328" text-anchor="middle">op_setting_1 (altitude)</text>
<text class="ts" x="55"  y="200" text-anchor="middle" transform="rotate(-90,55,200)">op_setting_2</text>

<!-- RIGHT PANEL -->
<rect x="370" y="40" width="270" height="270" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="th" x="505" y="60" text-anchor="middle">C-MAPSS situation</text>
<text class="ts" x="505" y="76" text-anchor="middle">discrete — exact snap points</text>

<!-- 6 tight stacks -->
<circle cx="400" cy="280" r="4" fill="#1D9E75" opacity="0.6"/>
<circle cx="402" cy="278" r="4" fill="#1D9E75" opacity="0.6"/>
<circle cx="399" cy="282" r="4" fill="#1D9E75" opacity="0.6"/>
<circle cx="400" cy="280" r="10" fill="none" stroke="#0F6E56" stroke-width="1.5"/>
<text class="ts" x="400" y="302" text-anchor="middle" fill="#085041">C4 sea level</text>

<circle cx="435" cy="240" r="4" fill="#BA7517" opacity="0.6"/>
<circle cx="437" cy="238" r="4" fill="#BA7517" opacity="0.6"/>
<circle cx="434" cy="242" r="4" fill="#BA7517" opacity="0.6"/>
<circle cx="435" cy="240" r="10" fill="none" stroke="#854F0B" stroke-width="1.5"/>
<text class="ts" x="435" y="262" text-anchor="middle" fill="#633806">C5 10k ft</text>

<circle cx="480" cy="200" r="4" fill="#7F77DD" opacity="0.6"/>
<circle cx="482" cy="198" r="4" fill="#7F77DD" opacity="0.6"/>
<circle cx="479" cy="202" r="4" fill="#7F77DD" opacity="0.6"/>
<circle cx="480" cy="200" r="10" fill="none" stroke="#534AB7" stroke-width="1.5"/>
<text class="ts" x="480" y="222" text-anchor="middle" fill="#3C3489">C2 20k ft</text>

<circle cx="510" cy="170" r="4" fill="#D85A30" opacity="0.6"/>
<circle cx="512" cy="168" r="4" fill="#D85A30" opacity="0.6"/>
<circle cx="509" cy="172" r="4" fill="#D85A30" opacity="0.6"/>
<circle cx="510" cy="170" r="10" fill="none" stroke="#993C1D" stroke-width="1.5"/>
<text class="ts" x="535" y="173" text-anchor="start" fill="#712B13">C3 25k ft</text>

<circle cx="555" cy="135" r="4" fill="#185FA5" opacity="0.6"/>
<circle cx="557" cy="133" r="4" fill="#185FA5" opacity="0.6"/>
<circle cx="554" cy="137" r="4" fill="#185FA5" opacity="0.6"/>
<circle cx="555" cy="135" r="10" fill="none" stroke="#0C447C" stroke-width="1.5"/>
<text class="ts" x="570" y="138" text-anchor="start" fill="#0C447C">C6 35k ft</text>

<circle cx="595" cy="100" r="4" fill="#444441" opacity="0.6"/>
<circle cx="597" cy="98"  r="4" fill="#444441" opacity="0.6"/>
<circle cx="594" cy="102" r="4" fill="#444441" opacity="0.6"/>
<circle cx="595" cy="100" r="10" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
<text class="ts" x="610" y="103" text-anchor="start">C1 42k ft</text>

<text class="ts" x="505" y="328" text-anchor="middle">op_setting_1 (altitude)</text>
<text class="ts" x="385" y="200" text-anchor="middle" transform="rotate(-90,385,200)">op_setting_2</text>

<!-- Summary -->
<line x1="40" y1="352" x2="640" y2="352" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="175" y="372" text-anchor="middle">Inertia large — centroid = approximation</text>
<text class="ts" x="505" y="372" text-anchor="middle">Inertia = 0.41 — centroid = exact point</text>
<text class="th" x="340" y="405" text-anchor="middle">KMeans does not approximate here — it recovers exact flight points</text>
</svg>
