<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sheet length relationship: train, test, and RUL</title>
<desc>Three rows showing the granularity of each sheet using FD001 as example. Train: one row per cycle per engine, full life. Test: one row per cycle per engine, truncated. RUL: one row per engine only.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Arial, sans-serif; fill: #2c2c2a; }
  .th  { font-size: 14px; font-weight: bold; }
  .ts  { font-size: 12px; fill: #5f5e5a; }
</style>

<!-- TRAIN ROW -->
<rect x="40" y="40" width="130" height="66" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="105" y="63" text-anchor="middle" dominant-baseline="central" fill="#04342C">train sheet</text>
<text class="ts" x="105" y="82" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">20,631 rows</text>

<rect x="190" y="48" width="450" height="50" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="415" y="73" text-anchor="middle" dominant-baseline="central" fill="#085041">100 engines × avg 206 cycles each → full life to failure</text>
<rect x="636" y="46" width="4" height="54" rx="1" fill="#993C1D"/>
<text class="ts" x="644" y="73" text-anchor="start" fill="#712B13">fail</text>

<line x1="190" y1="98" x2="190" y2="136" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="390" y1="98" x2="390" y2="136" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
<rect x="190" y="118" width="200" height="28" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="290" y="132" text-anchor="middle" dominant-baseline="central" fill="#04342C">engine 1: cycles 1 → 192 (failure at 192)</text>

<text class="ts" x="105" y="160" text-anchor="middle">cycle-level</text>
<text class="ts" x="105" y="174" text-anchor="middle">full life</text>

<!-- TEST ROW -->
<rect x="40" y="200" width="130" height="66" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="105" y="223" text-anchor="middle" dominant-baseline="central" fill="#26215C">test sheet</text>
<text class="ts" x="105" y="242" text-anchor="middle" dominant-baseline="central" fill="#534AB7">13,096 rows</text>

<rect x="190" y="208" width="300" height="50" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="233" text-anchor="middle" dominant-baseline="central" fill="#26215C">100 engines × avg 131 cycles each → truncated</text>
<line x1="490" y1="206" x2="490" y2="260" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3"/>
<text class="ts" x="496" y="228" text-anchor="start" fill="#534AB7">cut here</text>
<rect x="490" y="208" width="150" height="50" rx="4" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="565" y="233" text-anchor="middle" dominant-baseline="central" fill="#888780">unknown</text>
<rect x="636" y="206" width="4" height="54" rx="1" fill="#b4b2a9"/>
<text class="ts" x="644" y="233" text-anchor="start" fill="#b4b2a9">fail</text>

<line x1="190" y1="258" x2="190" y2="296" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="355" y1="258" x2="355" y2="296" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3 3"/>
<rect x="190" y="278" width="165" height="28" rx="3" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="272" y="292" text-anchor="middle" dominant-baseline="central" fill="#26215C">engine 1: cycles 1 → 131 (cut here)</text>

<text class="ts" x="105" y="320" text-anchor="middle">cycle-level</text>
<text class="ts" x="105" y="334" text-anchor="middle">partial life</text>

<!-- RUL ROW -->
<rect x="40" y="370" width="130" height="66" rx="6" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="105" y="393" text-anchor="middle" dominant-baseline="central" fill="#412402">RUL sheet</text>
<text class="ts" x="105" y="412" text-anchor="middle" dominant-baseline="central" fill="#854F0B">100 rows</text>

<rect x="190" y="378" width="60" height="50" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="220" y="399" text-anchor="middle" dominant-baseline="central" fill="#412402">1</text>
<text class="ts" x="220" y="416" text-anchor="middle" dominant-baseline="central" fill="#854F0B">61</text>
<rect x="258" y="378" width="60" height="50" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="288" y="399" text-anchor="middle" dominant-baseline="central" fill="#412402">2</text>
<text class="ts" x="288" y="416" text-anchor="middle" dominant-baseline="central" fill="#854F0B">98</text>
<rect x="326" y="378" width="60" height="50" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="356" y="399" text-anchor="middle" dominant-baseline="central" fill="#412402">3</text>
<text class="ts" x="356" y="416" text-anchor="middle" dominant-baseline="central" fill="#854F0B">69</text>
<text class="ts" x="420" y="403" text-anchor="start" fill="#888780">... x 97 more engines</text>

<text class="ts" x="220" y="440" text-anchor="middle" fill="#854f0b">unit</text>
<text class="ts" x="220" y="454" text-anchor="middle" fill="#854f0b">RUL</text>
<text class="ts" x="105" y="454" text-anchor="middle">engine-level</text>
<text class="ts" x="105" y="468" text-anchor="middle">one number</text>

<!-- Relationship arrow -->
<line x1="490" y1="260" x2="490" y2="372" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="502" y="305" text-anchor="start" fill="#534AB7">RUL file says:</text>
<text class="ts" x="502" y="319" text-anchor="start" fill="#534AB7">engine 1 had 61 cycles</text>
<text class="ts" x="502" y="333" text-anchor="start" fill="#534AB7">left after cycle 131</text>

<!-- Summary table -->
<line x1="40" y1="496" x2="640" y2="496" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="105" y="516" text-anchor="middle">sheet</text>
<text class="th" x="240" y="516" text-anchor="middle">granularity</text>
<text class="th" x="390" y="516" text-anchor="middle">row count</text>
<text class="th" x="540" y="516" text-anchor="middle">why different</text>
<line x1="40" y1="522" x2="640" y2="522" stroke="#d3d1c7" stroke-width="0.5"/>
<text class="ts" x="105" y="538" text-anchor="middle">train</text>
<text class="ts" x="240" y="538" text-anchor="middle">one row / cycle</text>
<text class="ts" x="390" y="538" text-anchor="middle">20,631</text>
<text class="ts" x="540" y="538" text-anchor="middle">full lives, all cycles</text>
<text class="ts" x="105" y="554" text-anchor="middle">test</text>
<text class="ts" x="240" y="554" text-anchor="middle">one row / cycle</text>
<text class="ts" x="390" y="554" text-anchor="middle">13,096</text>
<text class="ts" x="540" y="554" text-anchor="middle">truncated lives</text>
<text class="ts" x="105" y="570" text-anchor="middle">RUL</text>
<text class="ts" x="240" y="570" text-anchor="middle">one row / engine</text>
<text class="ts" x="390" y="570" text-anchor="middle">100</text>
<text class="ts" x="540" y="570" text-anchor="middle">one number per engine</text>
</svg>
